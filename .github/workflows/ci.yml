name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API unit tests
        run: npm test

      - name: Build (CI)
        run: npm run build:ci
        env:
          ROLLUP_SKIP_NODEJS_NATIVE: 'true'

  smoke-production:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Smoke test production deployment
        run: node scripts/smoke-deploy.mjs
        env:
          SMOKE_BASE_URL: https://www.vertexed.app
